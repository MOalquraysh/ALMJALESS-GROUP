<h2>المقر الرئيسي</h2>
<p>
مدينة الدمام - حي المنار - مجالس ناصر ابن قريش
</p>

<p>
المجالس ليست مجرد مكان للتجمع بل تعني اكثر من ذلك،
هي المكان الذي يجعل الشخص على طبيعته ولا مكان للتصنع فيها،
الجلوس فيها يبعث الراحة والطمأنينة ولذلك نطلق عليها "منطقة الراحة"
